<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="effect-love">
        <img src="/src/assets/heart.png" alt="">
        <img src="/src/assets/heart.png" alt="">
        <img src="/src/assets/heart.png" alt="">
    </div>
    

    <style>
        .effect-love {
  position: absolute;
  z-index: 30;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: flex;
  gap: 2px;

}
.effect-love img {
  width: 20px;
  transform: translate(0,0);
  animation: animat_effect_love .4s linear forwards;
  animation-delay: .2s;
}
.effect-love img:nth-child(1){
  animation-delay: .4s;
} 
.effect-love img:nth-child(2){
  animation-delay: .5s;
} 
.effect-love img:nth-child(3){
  animation-delay: .6s;
} 

@keyframes animat_effect_love {
  0%{
    opacity: 1;
    transform: translate(0,0);
  }
  100%{
    opacity: 0;
    transform: translate(0,-30px);
  }
}
    </style>
</body>
</html>
